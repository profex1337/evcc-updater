name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to create a Release on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Only a boolean is job-wide; the secret VALUES are env-scoped to the
      # "Configure release signing" step. The materialized keystore +
      # key.properties FILES are then deleted right after the builds (see the
      # cleanup step) so the later third-party upload/publish actions can't read
      # them from the workspace either.
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      # Third-party actions pinned to full commit SHAs (a mutable @vX tag could
      # be hijacked to run with workspace/token access). Update the SHA + the
      # trailing version comment together when bumping.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Require signing secret for tagged releases
        if: startsWith(github.ref, 'refs/tags/') && env.HAS_KEYSTORE != 'true'
        run: |
          echo "::error::KEYSTORE_BASE64 is not set — refusing to publish an unsigned release."
          exit 1

      - name: Configure release signing
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # Fat APK with both ARM ABIs (64- + 32-bit) so it installs on every real
      # phone — arm64-only would fail to install on armeabi-v7a devices. x86_64
      # (emulator-only) is left out to keep the size down.
      - name: Build release APK (arm64 + armeabi-v7a)
        run: flutter build apk --release --target-platform android-arm64,android-arm

      # Play Store wants an App Bundle (.aab). Built only when signing is
      # configured; kept as a CI artifact (NOT attached to the public release,
      # so friends only ever see the installable .apk). Built here — before the
      # signing material is wiped — so both artifacts exist first.
      - name: Build release App Bundle (Play Store)
        if: env.HAS_KEYSTORE == 'true'
        run: flutter build appbundle --release

      # Delete the keystore + plaintext key.properties from the workspace before
      # any third-party action runs, so a compromised upload/publish action
      # can't exfiltrate the release signing key. Runs even if a build failed.
      - name: Remove signing material before third-party steps
        if: ${{ always() && env.HAS_KEYSTORE == 'true' }}
        run: rm -f android/app/upload-keystore.jks android/key.properties

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: evcc-pi-tool-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload Play Store AAB artifact
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: evcc-pi-tool-playstore-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/') && env.HAS_KEYSTORE == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
